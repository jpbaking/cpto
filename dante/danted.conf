# Logging (syslog, stdout, or a specific file)
logoutput: stdout

# The IP/interface and port Dante will listen on.
# 0.0.0.0 listens on all available IPv4 interfaces.
internal: 0.0.0.0 port = 1080

# The network interface or IP used for outgoing connections.
# NOTE: Change "eth0" to match your actual external interface (e.g., ens3, wlan0).
external: xxxxxxxx

# Authentication methods
# "none" means no username/password is required.
socksmethod: none
clientmethod: none

# Privileges
# Dante needs root to start, but drops privileges to 'nobody' or 'proxy' for security.
user.privileged: root
user.notprivileged: nobody

# --- ACCESS CONTROL RULES ---

# Client access rules: Who is allowed to connect to the Dante server?
# 0.0.0.0/0 allows connections from any IP address.
client pass {
    from: 0.0.0.0/0 port 1-65535 to: 0.0.0.0/0
    log: error connect disconnect
}

# SOCKS access rules: Where are the clients allowed to go?
# This rule allows clients to connect to any destination on any port.
socks pass {
    from: 0.0.0.0/0 to: 0.0.0.0/0
    command: bind connect udpassociate
    log: error connect disconnect
}