x-common: &common
  sysctls:
    - net.core.somaxconn=4096
  restart: unless-stopped
  logging:
    driver: json-file
    options:
      max-file: "1"
      max-size: 10m

x-dns: &dns
  dns:
    - 1.1.1.1
    - 1.0.0.1

x-openvpn-network: &openvpn-network
  depends_on:
    openvpn:
      condition: service_healthy
  network_mode: service:openvpn
  <<: *common

services:
  openvpn:
    image: jpbaking/cpto-openvpn:latest
    build:
      context: openvpn
      dockerfile: openvpn.Dockerfile
    command: ${OPENVPN_CMD_ARGS}
    cap_add:
      - NET_ADMIN
    devices:
      - /dev/net/tun
    volumes:
      - ${OPENVPN_CONFIG_DIR}:/.openvpn:ro
    healthcheck:
      test: ["CMD-SHELL", "ip addr show tun0 2>/dev/null | grep -q 'inet '"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 30s
    <<: [*dns, *common]

  tinyproxy:
    image: jpbaking/cpto-tinyproxy:latest
    build:
      context: tinyproxy
      dockerfile: tinyproxy.Dockerfile
    <<: *openvpn-network

  srelay:
    image: jpbaking/cpto-srelay:latest
    build:
      context: srelay
      dockerfile: srelay.Dockerfile
    <<: *openvpn-network

  haproxy:
    image: haproxy:alpine
    volumes:
      - ./haproxy/haproxy.cfg:/usr/local/etc/haproxy/haproxy.cfg:ro
    ports:
      - 0.0.0.0:${HTTP_PROXY_PORT}:3128
      - 0.0.0.0:${SOCKS_PROXY_PORT}:1080
    depends_on:
      openvpn:
        condition: service_healthy
      tinyproxy:
        condition: service_started
      srelay:
        condition: service_started
    <<: *common
