# Replaces haproxy from the Compose stack.
# Kubernetes load-balances across all ready Pod replicas natively.
apiVersion: v1
kind: Service
metadata:
  name: cpto
  namespace: cpto
spec:
  type: NodePort
  selector:
    app: cpto
  ports:
    - name: http-proxy
      port: 3128
      targetPort: 3128
    - name: socks-proxy
      port: 1080
      targetPort: 1080
