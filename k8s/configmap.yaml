apiVersion: v1
kind: ConfigMap
metadata:
  name: cpto-config
  namespace: cpto
data:
  tinyproxy.conf: |
    User tinyproxy
    Group tinyproxy
    Port 3128
    Timeout 600
    DefaultErrorFile "/usr/share/tinyproxy/default.html"
    LogLevel Connect
    MaxClients 100
    MinSpareServers 5
    MaxSpareServers 20
    StartServers 10
    MaxRequestsPerChild 0
    ViaProxyName "tinyproxy"
  srelay.conf: |
    0.0.0.0    any
