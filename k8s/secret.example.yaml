# Copy to k8s/secret.yaml and fill in your OpenVPN credentials.
# k8s/secret.yaml is gitignored.
#
# All files placed here are mounted read-only at /.openvpn inside the
# openvpn container. Relative paths in your .ovpn file resolve there.
apiVersion: v1
kind: Secret
metadata:
  name: cpto-openvpn
  namespace: cpto
type: Opaque
stringData:
  client.ovpn: |
    # Paste your .ovpn file contents here
  # auth.txt: |
  #   username
  #   password
